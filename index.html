<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pooja Surprise ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
overflow:hidden;
text-align:center;
color:black;
}

.container{
max-width:600px;
padding:30px;
}

.hidden{
display:none;
}

h1{
font-family:'Great Vibes',cursive;
font-size:55px;
}

button{
padding:15px 30px;
border:none;
border-radius:30px;
background:#ff4e8a;
color:white;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

button:hover{
transform:scale(1.05);
}

/* glowing name */

.glow{
font-size:70px;
font-family:'Great Vibes',cursive;
color:white;
text-shadow:0 0 10px #ff4da6,0 0 40px #ff4da6;
animation:glowPulse 2s infinite alternate;
}

@keyframes glowPulse{
from{ text-shadow:0 0 10px #ff4da6 }
to{ text-shadow:0 0 40px #ff99cc }
}

/* photo */

.memory{
margin-top:20px;
}

.memory img{
width:260px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

/* floating hearts */

.heart{
position:absolute;
width:20px;
height:20px;
background:red;
transform:rotate(45deg);
animation:float 10s linear infinite;
opacity:0.7;
}

.heart:before,
.heart:after{
content:'';
position:absolute;
width:20px;
height:20px;
background:red;
border-radius:50%;
}

.heart:before{top:-10px;}
.heart:after{left:-10px;}

@keyframes float{
0%{transform:translateY(100vh) rotate(45deg);opacity:0}
50%{opacity:1}
100%{transform:translateY(-10vh) rotate(45deg);opacity:0}
}

</style>
</head>

<body>

<div class="container">

<!-- PASSWORD SCREEN -->

<div id="passwordScreen">

<h1>Secret Surprise 🔐</h1>

<p>Only Pooja can unlock this</p>

<input type="password" id="pass" placeholder="Enter Password">

<br>

<button onclick="checkPassword()">Unlock</button>

<p id="wrong" style="color:red;"></p>

</div>

<!-- MAIN CONTENT -->

<div id="mainContent" class="hidden">

<h1>A small surprise...</h1>

<p>For someone very special ❤️</p>

<button onclick="startJourney()">Start</button>

</div>

<!-- JOURNEY -->

<div id="step1" class="hidden">

<p>Before we start... I want to tell you something.</p>

<button onclick="step2()">Next</button>

</div>

<div id="step2" class="hidden">

<p>You inspire me every single day.</p>

<button onclick="showLetter()">Continue</button>

</div>

<!-- TYPING LETTER -->

<div id="letterSection" class="hidden">

<h1>For You Pooja ❤️</h1>

<p id="letterText"></p>

<button onclick="showMemory()">One More Thing</button>

</div>

<!-- MEMORY PHOTO -->

<div id="memorySection" class="hidden">

<h1>One of my favourite memories</h1>

<div class="memory">

<img src="IMG20251230201854.jpg">

</div>

<button onclick="finalMessage()">Final Surprise</button>

</div>

<!-- FINAL -->

<div id="finalSection" class="hidden">

<h1>Happy Women's Day</h1>

<div class="glow">Pooja</div>

<p>You make my life brighter every day ❤️</p>

</div>

</div>

<script>

/* password */

function checkPassword(){

let pass=document.getElementById("pass").value;

if(pass==="NP"){
document.getElementById("passwordScreen").classList.add("hidden");
document.getElementById("mainContent").classList.remove("hidden");
}
else{
document.getElementById("wrong").innerText="Wrong password ❤️";
}

}

/* steps */

function startJourney(){
document.getElementById("mainContent").classList.add("hidden");
document.getElementById("step1").classList.remove("hidden");
}

function step2(){
document.getElementById("step1").classList.add("hidden");
document.getElementById("step2").classList.remove("hidden");
}

/* typing letter */

function showLetter(){

document.getElementById("step2").classList.add("hidden");
document.getElementById("letterSection").classList.remove("hidden");

let text="From the moment you came into my life, everything became brighter. Your smile, your strength, and your kindness inspire me every single day. Today is Women's Day, but honestly you deserve to be celebrated every day. I am truly lucky to have you in my life.";

let i=0;

function type(){
if(i<text.length){
document.getElementById("letterText").innerHTML+=text.charAt(i);
i++;
setTimeout(type,40);
}
}

type();

}

/* memory */

function showMemory(){

document.getElementById("letterSection").classList.add("hidden");
document.getElementById("memorySection").classList.remove("hidden");

}

/* final */

function finalMessage(){

document.getElementById("memorySection").classList.add("hidden");
document.getElementById("finalSection").classList.remove("hidden");

}

/* floating hearts */

function createHeart(){

let heart=document.createElement("div");
heart.className="heart";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=5+Math.random()*5+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),10000);

}

setInterval(createHeart,500);

</script>

</body>
</html>
